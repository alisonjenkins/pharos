# cargo-nextest config — see https://nexte.st/docs/configuration/
# devShell already pins the binary (`cargo-nextest`). Invoke via
# `nix develop --command cargo nextest run --workspace`.

[profile.default]
# Stable output ordering; nicer in CI logs.
status-level = "pass"
final-status-level = "flaky"
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 4 }
test-threads = "num-cpus"

[profile.ci]
retries = 2
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }
final-status-level = "slow"

# Run inside the nix build sandbox (crane cargoNextest, `.#pharos` doCheck) —
# tests the ACTUAL shipped artifact. The sandbox is I/O-constrained (store
# disk, no page cache warmth) so seed/heavy tests (20k-row pagination) run
# several times slower than on a warm devShell. Give them generous headroom —
# this is a batch build, not interactive — so a slow test is never mistaken for
# a hang and terminated. 12×120s = 24 min ceiling per test; the CI job's own
# 120-min timeout is the real backstop.
[profile.nix]
retries = 1
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 12 }
final-status-level = "slow"
test-threads = "num-cpus"

[[profile.default.overrides]]
# sqlite integration tests in pharos-store-sqlx spin up in-memory pools;
# parallel runs are fine.
filter = "package(pharos-store-sqlx)"
test-threads = 4
