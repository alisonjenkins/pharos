# Default values for the pharos chart.
# Production-leaning defaults: SQLite on a PVC, single replica (sqlite is a
# single-writer), local-artwork/transcode caches on a PVC, media read-only.

image:
  repository: pharos
  # Overridden by Tilt / your registry. The nix-built image is `pharos:latest`.
  tag: "latest"
  pullPolicy: IfNotPresent
pullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Steady-state replica count. 1 is right for this single-node cluster: even on
# Postgres, >1 steady replica gives no node-failure HA. Zero-downtime deploys
# come from the RollingUpdate SURGE (a 2nd pod briefly overlaps the draining
# old one), not from running 2 all the time. On SQLite this MUST stay 1
# (single-writer); the chart also forces Recreate there regardless of strategy.
replicaCount: 1

# Deploy strategy. On SQLite the chart forces Recreate (the RWO db PVC can't be
# shared by two pods mid-rollout). On Postgres, RollingUpdate gives zero-downtime:
# a surge pod comes up + becomes ready before the old one drains.
strategy:
  type: Recreate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Grace period for a pod to finish in-flight requests after SIGTERM before
# SIGKILL. Must exceed config.server.drainGraceSecs + the app's ~30s graceful
# stop. The app flips /readyz to 503 on SIGTERM so the LB stops new traffic
# immediately, then serves in-flight requests during the grace window.
terminationGracePeriodSeconds: 60

# Extra container env vars (raw list). Use to inject PHAROS_DATABASE_URL from a
# Secret (e.g. a CloudNativePG-generated app secret) so a Postgres password is
# never written into config.toml / git. Overrides [database].url at runtime.
extraEnv: []
#  - name: PHAROS_DATABASE_URL
#    valueFrom:
#      secretKeyRef:
#        name: pharos-db-app
#        key: uri

# ── pharos config.toml, rendered into a ConfigMap mounted at
#    /etc/pharos/config.toml. Optional fields are omitted when null/empty.
config:
  server:
    bind: "0.0.0.0:8096"
    name: "pharos"
    # In-image Dioxus UI bundle path (only if the image was built with it).
    # Leave null to use the optional jellyfin-web UI deployment instead.
    uiDir: null
    # Caches live under the cache volume (see persistence.cache).
    imageCacheDir: "/var/lib/pharos/cache/images"
    imageSeekSeconds: 30
    # Soft cap (bytes) on the extracted-image cache; 0 = unbounded. A periodic
    # janitor evicts oldest-first once exceeded. Set it on large libraries so
    # posters/backdrops/thumbs can't slowly fill the shared cache volume.
    imageCacheMaxBytes: 0
    transcodeCacheDir: "/var/lib/pharos/cache/transcode"
    transcodeCacheMaxBytes: 1073741824      # 1 GiB
    trickplayCacheDir: "/var/lib/pharos/cache/trickplay"
    trickplayCacheMaxBytes: 268435456       # 256 MiB
    trickplayIntervalMs: 10000
    trickplayWidths: [320, 640, 1280]
    # auto | off | VideoToolbox | NVENC | QSV | VAAPI. With a hw value set,
    # see `gpu` below to expose the device.
    hwaccel: "auto"
    transcodeHwSessionCap: 2
    transcodeProbeCaps: true
    # B60 — serve H.264 to desktop Linux Firefox instead of the forced VP9/WebM
    # path (B43). VP9 is a fragile software-only path (separate audio rendition
    # that stalls a deep seek — the Sabrina hang) and keeps a Linux-FF member off
    # the group's shared H.264 encode. Modern Linux Firefox decodes H.264 in MSE,
    # so this is on. Flip to false if a Linux Firefox can't play (hls.js fatals).
    linuxFirefoxH264: true
    subtitleCacheMaxBytes: 67108864         # 64 MiB
    subtitleCacheMaxEntries: 1024
    liveTvM3u: null
    liveTvXmltv: null
    ssdpEnabled: false
    ssdpAdvertiseUrl: null
    playedThresholdPct: 90
    scanRateLimitMs: 0
    # #11 — concurrent per-file probes during a scan. 0 = the scanner's
    # conservative default (leaves shared-storage I/O headroom so a scan doesn't
    # starve foreground reads: subtitle extraction, HLS segments, trickplay
    # generation). Raise to 8 on local-SSD storage; lower on a slow NFS/SMB link.
    scanProbeConcurrency: 0
    libraryWatchEnabled: true
    libraryPollIntervalSecs: 300
    # Seconds to keep serving in-flight requests after SIGTERM before the
    # graceful stop. /readyz flips 503 immediately so the LB stops new traffic;
    # this window lets active segment/stream reads finish (zero-downtime deploy).
    drainGraceSecs: 10
  obs:
    logLevel: "info"
    otlpEndpoint: null
    logDir: null
    # B68 — log EVERY request (not just errors) so a strict client crashing on
    # a 200 response body can be traced to the exact endpoint. Temporary debug
    # aid; set false once the Android-TV crash is diagnosed.
    logAllRequests: true
  media:
    # Plain roots (each becomes a "mixed" library named after its basename).
    roots:
      - "/var/lib/pharos/media"
    # Typed libraries (LIB-C1). Each: {path, name?, kind: movies|tvshows|music|mixed}.
    libraries: []
  database:
    # SQLite on the db PVC by default. Set a postgres:// URL to use Postgres
    # (the db PVC is then not created).
    url: "sqlite:///var/lib/pharos/db/pharos.db?mode=rwc"

# ── Persistence
persistence:
  db:
    # Only used when config.database.url is a sqlite URL.
    enabled: true
    size: 1Gi
    storageClass: null          # null = cluster default
    accessMode: ReadWriteOnce
    # When enabled=false (emptyDir), the medium for the db volume. Set
    # "Memory" (tmpfs) on clusters whose ephemeral fs is overlayfs (e.g.
    # kind), where SQLite POSIX locking otherwise fails. "" = node disk.
    medium: ""
  cache:
    enabled: true               # false → emptyDir
    size: 5Gi
    storageClass: null
    accessMode: ReadWriteOnce
  media:
    # How the read-only media root is provided. One of:
    #   existingClaim | pvc | hostPath | nfs | emptyDir
    type: emptyDir
    existingClaim: ""
    pvc:
      size: 100Gi
      storageClass: null
      accessMode: ReadWriteMany
    hostPath: ""
    nfs:
      server: ""
      path: ""
    readOnly: true

service:
  type: ClusterIP
  port: 8096
  annotations: {}

ingress:
  enabled: false
  className: ""                 # e.g. "traefik"
  annotations: {}               # e.g. cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: pharos.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Prometheus-operator ServiceMonitor scraping /metrics.
serviceMonitor:
  enabled: false
  namespace: ""                 # default: release namespace
  interval: 30s
  labels: {}                    # e.g. release: kube-prometheus-stack

# Dev convenience: populate an (emptyDir) media volume from a media-bearing
# image before the scan/serve containers. The image's own entrypoint copies
# its baked media into `mountPath`. Used by Tilt with the nix CC test-media
# image; leave disabled in production (media comes from a PVC/NFS).
mediaSeed:
  enabled: false
  image:
    repository: pharos-test-media
    tag: "latest"
    pullPolicy: IfNotPresent
  mountPath: /media

# Library scan.
scan:
  # Run `pharos scan` as an initContainer before `serve` starts. NO LONGER
  # NEEDED with the in-process poll on: the server runs a boot scan itself on
  # startup (non-blocking, single-writer safe), so a fresh deploy populates
  # without gating readiness on a full media scan. Leave false; enable only
  # for an odd setup where the server's boot scan is off (e.g.
  # libraryPollIntervalSecs=0 and no CronJob).
  initContainer: false
  # Optional separate CronJob running `pharos scan`. Intended for Postgres
  # (multi-writer) or when you set config.server.libraryPollIntervalSecs=0
  # to disable the in-process poll (which also disables the boot scan). With
  # SQLite + the in-process poll on, leave this off (a concurrent scan pod
  # would contend on the db lock).
  cron:
    enabled: false
    schedule: "0 * * * *"

# jellyfin-web: the pinned upstream Jellyfin web client. angie image serving
# the bundle under /web/ + reverse-proxying the REST API to pharos so the
# browser is same-origin.
jellyfinWeb:
  enabled: true
  image:
    repository: pharos-jellyfin-web
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8097
  service:
    type: ClusterIP

# pharos-ui: pharos's own Dioxus UI. angie image serving the WASM bundle
# under /ui/ + reverse-proxying the REST API to pharos, same-origin.
pharosUi:
  enabled: true
  image:
    repository: pharos-ui
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8098
  service:
    type: ClusterIP

# GPU passthrough for hardware transcode (config.server.hwaccel != off/auto-cpu).
gpu:
  # VAAPI: mount /dev/dri (needs a privileged-ish securityContext or a device
  # plugin). NVENC: set runtimeClassName + nvidia.com/gpu resource.
  vaapi:
    enabled: false
    devicePath: /dev/dri
  nvidia:
    enabled: false
    runtimeClassName: nvidia
    count: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "4"
    memory: 2Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # ffmpeg/tokio want a writable /tmp
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# Probe tolerances are deliberately generous. A library scan (boot, periodic,
# or a forced re-probe) drives the libav worker pool + sqlite writes hard and
# can stall the async runtime past the k8s-default 1s probe timeout for brief
# windows. With the defaults (timeoutSeconds 1, failureThreshold 3) the kubelet
# killed the pod mid-scan, the replacement started another boot scan, and the
# server crash-looped — no scan ever completed. Give /healthz ~90s and /readyz
# ~60s of grace so a busy-but-alive server is not mistaken for a hung one, while
# a genuinely dead server is still caught.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
