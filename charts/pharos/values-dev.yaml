# Tilt / local-kind dev overrides. Ephemeral storage, UI on, no ingress.
# Media is empty at pod start and populated by the Tiltfile (kubectl cp of
# the nix CC test-media corpus) + a scan — so the in-pod scan initContainer
# is OFF (it would run before the media is copied).

image:
  repository: pharos
  tag: latest
  pullPolicy: IfNotPresent

# Ephemeral — kind throwaway cluster, no PVC churn.
persistence:
  db:
    enabled: false        # emptyDir
  cache:
    enabled: false        # emptyDir
  media:
    type: emptyDir
    readOnly: false       # Tilt kubectl-cp's fixtures in, then scans

scan:
  initContainer: false    # Tiltfile runs scan after copying media

config:
  server:
    name: "pharos-dev"
    # Faster feedback than the 5-min default while iterating.
    libraryPollIntervalSecs: 60
  obs:
    logLevel: "debug"

ui:
  enabled: true

ingress:
  enabled: false
serviceMonitor:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "2"
    memory: 1Gi
