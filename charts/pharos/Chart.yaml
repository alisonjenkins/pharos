apiVersion: v2
name: pharos
description: >-
  Pharos media server — a Jellyfin/Plex-compatible media server (actix-web,
  ffmpeg, SQLite/Postgres). Deploys the distroless nix-built OCI image with
  the crash-isolated transcode worker, persistent db/cache, and configurable
  media storage.
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Tracks the pharos app; the image tag in values overrides at deploy time.
appVersion: "0.0.0"
kubeVersion: ">=1.25.0-0"
home: https://github.com/alisonjenkins/pharos
sources:
  - https://github.com/alisonjenkins/pharos
keywords:
  - media-server
  - jellyfin
  - plex
  - ffmpeg
maintainers:
  - name: alisonjenkins
