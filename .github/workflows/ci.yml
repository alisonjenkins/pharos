name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a newer push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test + lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Validate flake
        run: nix flake check --no-build

      - name: Build workspace
        run: nix develop --command cargo build --workspace --locked

      - name: Tests
        run: nix develop --command cargo nextest run --workspace --profile ci

      - name: Doctests
        run: nix develop --command cargo test --doc --workspace

      - name: Lint (clippy -D warnings)
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt
        run: nix develop --command cargo fmt --all -- --check

  audit:
    name: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo-audit (RustSec)
        run: nix develop --command cargo audit
      - name: cargo-deny (licenses + bans)
        run: nix develop --command cargo deny check

  oci:
    name: package + oci image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: nix build .#pharos
        run: nix build .#pharos --print-out-paths
      - name: nix build .#oci
        run: nix build .#oci --print-out-paths
      - name: Upload OCI image tarball
        uses: actions/upload-artifact@v4
        with:
          name: pharos-oci-${{ github.sha }}
          path: result
          if-no-files-found: error
          retention-days: 7

  compat-playwright:
    name: jellyfin-web crawl
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: npm install
        run: nix develop --command bash -c 'cd compat-playwright && npm install --no-audit --no-fund'
      - name: Install Playwright chromium
        run: nix develop --command bash -c 'cd compat-playwright && npx playwright install chromium'
      - name: Run Playwright crawl
        run: nix develop --command bash -c 'just compat-playwright-full'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: compat-playwright/playwright-report
          if-no-files-found: ignore
          retention-days: 7
