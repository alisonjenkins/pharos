name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a newer push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test + lint
    # Self-hosted home nix builder (host daemon + warm store). Other jobs stay
    # on ubuntu-latest.
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    # Never run fork-PR code on the self-hosted runner (the enforcer's fork-PR
    # approval gate is the primary control; this is a backstop).
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    steps:
      - uses: actions/checkout@v4

      - uses: alisonjenkins/setup-host-nix@v1

      - name: Validate flake
        run: nix flake check --no-build

      - name: Build workspace
        run: nix develop --command cargo build --workspace --locked

      - name: Tests
        run: nix develop --command cargo nextest run --workspace --profile ci

      - name: Doctests
        run: nix develop --command cargo test --doc --workspace

      - name: Lint (clippy -D warnings)
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt
        run: nix develop --command cargo fmt --all -- --check

  audit:
    name: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo-audit (RustSec)
        run: nix develop --command cargo audit
      - name: cargo-deny (licenses + bans)
        run: nix develop --command cargo deny check

  oci:
    name: package + oci image
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      - name: nix build .#pharos
        run: nix build .#pharos --print-out-paths
      - name: nix build .#oci
        run: nix build .#oci --print-out-paths
      - name: Upload OCI image tarball
        uses: actions/upload-artifact@v4
        with:
          name: pharos-oci-${{ github.sha }}
          path: result
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish images (ghcr)
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    needs: [test, oci]
    # Only on a push that landed on main — PRs build the image (oci job)
    # but must not publish. Uses the built-in GITHUB_TOKEN (packages:
    # write) as the GHCR credential; no external secret needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      - name: Build OCI archives
        run: |
          nix build .#oci --out-link result-oci --print-out-paths
          nix build .#jellyfinWebOci --out-link result-jfweb --print-out-paths
      - name: Push to GHCR (latest + immutable sha tag)
        env:
          # GHCR accepts the workflow token as the password for any
          # username; use the actor for readability.
          GHCR_CREDS: ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publish() {
            archive="$1"; repo="$2"
            for tag in latest "$GITHUB_SHA"; do
              nix develop --command skopeo copy \
                --dest-creds "$GHCR_CREDS" \
                "docker-archive:$archive" \
                "docker://$repo:$tag"
            done
          }
          publish result-oci    ghcr.io/alisonjenkins/pharos
          publish result-jfweb  ghcr.io/alisonjenkins/pharos-jellyfin-web

  compat-playwright:
    name: jellyfin-web crawl
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      - name: npm install
        run: nix develop --command bash -c 'cd compat-playwright && npm install --no-audit --no-fund'
      # Browser binaries come from the nix-pinned playwright-driver
      # (PLAYWRIGHT_BROWSERS_PATH, exported by the devShell). No
      # `npx playwright install` — the @playwright/test version is pinned
      # to match playwright-driver so the store path has the right rev.
      - name: Run Playwright crawl
        run: nix develop --command bash -c 'just compat-playwright-full'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: compat-playwright/playwright-report
          if-no-files-found: ignore
          retention-days: 7
