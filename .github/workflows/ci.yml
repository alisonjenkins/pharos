name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a newer push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test + lint
    # Self-hosted home nix builder (host daemon + warm store). Other jobs stay
    # on ubuntu-latest.
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    # Never run fork-PR code on the self-hosted runner (the enforcer's fork-PR
    # approval gate is the primary control; this is a backstop).
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    steps:
      - uses: actions/checkout@v4

      - uses: alisonjenkins/setup-host-nix@v1

      # One command builds `.#pharos` and runs the WHOLE workspace suite
      # (nextest, `--profile nix` timeouts), clippy (`-D warnings`), rustfmt,
      # and doctests — each a crane flake `check` sharing ONE cached
      # cargoArtifacts, run in PARALLEL by nix. Crucially these test the ACTUAL
      # shipped artifact (same source + toolchain the image is built from), not
      # a separately cargo-built one, and the deps are store-cached instead of
      # recompiled every ephemeral-runner run.
      - name: nix flake check (build + tests + clippy + fmt + doctests)
        run: nix flake check -L

  audit:
    name: supply-chain
    # Self-hosted home nix builder (host daemon + warm store), same as the
    # other jobs — no Azure-hosted runner + no DeterminateSystems installer /
    # magic-nix-cache round-trip.
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    continue-on-error: false
    # Never run fork-PR code on the self-hosted runner (backstop to the
    # enforcer's fork-PR approval gate; matches the `test` job).
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      - name: cargo-audit (RustSec)
        run: nix develop --command cargo audit
      - name: cargo-deny (licenses + bans)
        run: nix develop --command cargo deny check

  oci:
    name: package + oci image
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    # NO `needs: [test]`: this nix build shares nothing with the cargo build in
    # `test`, so gating it behind test only serialised ~4 min after ~3 min. Run
    # it in PARALLEL — `publish` still `needs: [test, oci]`, so a failing test
    # never ships an image. On PRs this is the sole validation that BOTH images
    # (pharos + jellyfin-web) still build. With crane's cached dep artifact,
    # only changed workspace crates recompile here.
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      # Build both images into the (host-shared, warm) nix store. `publish`
      # reuses these exact store paths as instant cache hits — no artifact
      # upload/download round-trip of a ~100 MB tarball.
      - name: Build OCI images
        run: |
          nix build .#oci            --no-link --print-out-paths
          nix build .#jellyfinWebOci --no-link --print-out-paths

  publish:
    name: publish images (ghcr)
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    needs: [test, oci]
    # Only on a push that landed on main — PRs build the images (oci job)
    # but must not publish. Consumes the tarballs the `oci` job already built
    # (build-once): no second `nix build`, just download + push.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      - name: Push images to GHCR (latest + immutable sha tags)
        env:
          # A PAT with write:packages, NOT the workflow GITHUB_TOKEN: these
          # GHCR packages are user-owned + were created out-of-band, so the
          # repo's GITHUB_TOKEN has no write grant on them (permission_denied:
          # write_package). The PAT sidesteps GHCR's user-package Actions-access.
          GHCR_CREDS: alisonjenkins:${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          # Flux image automation orders tags numerically, and a commit SHA
          # doesn't sort. Add a monotonic `main-<commit-unix-ts>-<shortsha>`
          # tag: the timestamp lets the ImagePolicy pick the newest build while
          # the short SHA keeps it traceable. `latest` + full SHA stay for
          # humans / manual pins.
          COMMIT_TS="$(git show -s --format=%ct HEAD)"
          SORTABLE="main-${COMMIT_TS}-${GITHUB_SHA:0:12}"
          # `.#oci` / `.#jellyfinWebOci` are streamLayeredImage SCRIPTS (built by
          # `needs: [oci]` into the warm store → instant cache hits). Each writes
          # the image tar to stdout; stream it ONCE into a local OCI layout, then
          # push every tag from that layout — one assembly per image, no per-tag
          # re-stream, no gzipped store tarball, no artifact round-trip.
          OCI_SCRIPT="$(nix build .#oci --no-link --print-out-paths)"
          JFWEB_SCRIPT="$(nix build .#jellyfinWebOci --no-link --print-out-paths)"
          publish() {
            script="$1"; repo="$2"
            stage="$(mktemp -d)/img"
            "$script" | nix develop --command skopeo --insecure-policy copy \
              docker-archive:/dev/stdin "oci:${stage}:img"
            for tag in latest "$GITHUB_SHA" "$SORTABLE"; do
              nix develop --command skopeo --insecure-policy copy \
                --dest-creds "$GHCR_CREDS" \
                "oci:${stage}:img" "docker://${repo}:${tag}"
            done
          }
          publish "$OCI_SCRIPT"   ghcr.io/alisonjenkins/pharos
          publish "$JFWEB_SCRIPT" ghcr.io/alisonjenkins/pharos-jellyfin-web

  compat-playwright:
    name: jellyfin-web crawl
    runs-on: pharos-nix-builder-amd64
    timeout-minutes: 120
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: alisonjenkins/setup-host-nix@v1
      - name: npm install
        run: nix develop --command bash -c 'cd compat-playwright && npm install --no-audit --no-fund'
      # Browser binaries come from the nix-pinned playwright-driver
      # (PLAYWRIGHT_BROWSERS_PATH, exported by the devShell). No
      # `npx playwright install` — the @playwright/test version is pinned
      # to match playwright-driver so the store path has the right rev.
      - name: Run Playwright crawl
        run: nix develop --command bash -c 'just compat-playwright-full'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: compat-playwright/playwright-report
          if-no-files-found: ignore
          retention-days: 7
